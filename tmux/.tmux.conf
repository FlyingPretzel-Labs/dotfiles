unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-a
bind C-a send-prefix            # double-tap Ctrl-a sends a literal Ctrl-a (keeps shell start-of-line)
bind * setw synchronize-panes   # prefix * toggles synchronized typing across panes
bind a display-popup -E -w 60% -h 60% "/home/auri/bin/mux-add.sh"   # prefix a: fzf-pick host(s) to add to the current synced grid

set -g base-index 1
set -g renumber-windows on
set -g mouse on
set-option -g status-position top

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "default"

# window pills: name segment transparent, only the NUMBER colored, number on the RIGHT.
# v2 REMOVED @catppuccin_window_default_fill / _current_fill; reproduce "fill=number"
# by coloring only the number segment and setting the name segment bg to default.
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text_color "default"
set -g @catppuccin_window_current_text_color "default"
set -g @catppuccin_window_number_color "#{@thm_green}"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"

set -g @catppuccin_menu_selected_style "fg=#{@thm_fg},bold,bg=#{@thm_overlay_0}"

# session pill: icon + separators MUST be set BEFORE tpm loads
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_session_icon "  "
set -g @catppuccin_session_text " #S"

# Initialize TMUX plugin manager (keep this near the bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
